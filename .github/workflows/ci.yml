name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/test-apps-repo

jobs:
  validate:
    name: Validate Kustomize
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Install kustomize
        run: |
          set -e
          TAG=$(curl -sL "https://api.github.com/repos/kubernetes-sigs/kustomize/releases/latest" | python3 -c "import sys,json; print(json.load(sys.stdin)['tag_name'])")
          curl -sSL "https://github.com/kubernetes-sigs/kustomize/releases/download/${TAG}/kustomize_${TAG#kustomize\/}_linux_amd64.tar.gz" -o kustomize.tar.gz
          tar xzf kustomize.tar.gz
          chmod +x kustomize
          ./kustomize version
      - name: Validate all overlays
        run: |
          set -e
          ./kustomize build environments/dev
          ./kustomize build environments/staging
          ./kustomize build environments/prod

  build:
    name: Build & Push
    needs: validate
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=ref,event=branch
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=main
          cache-to: type=gha,mode=max,scope=main
          provenance: false
          sbom: false

      - name: Commit image tag to Git
        if: github.ref == 'refs/heads/main'
        run: |
          set -e
          # metadata-action uses format=short (7 chars), match it exactly
          IMAGE_TAG="${GITHUB_SHA:0:7}"
          FULL_IMAGE="ghcr.io/mickberrad659-sketch/test-apps-repo:${IMAGE_TAG}"

          echo "Committing image tag ${FULL_IMAGE} to environments/base/deployment.yaml"

          # Update image in base deployment
          sed -i "s|image:.*|image: ${FULL_IMAGE}|" environments/base/deployment.yaml
          cat environments/base/deployment.yaml

          # Commit if changed (skip if CI commit itself)
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add environments/base/deployment.yaml
            git commit -m "ci: update image to ${IMAGE_TAG}"
            git push origin main
            echo "Image tag committed: ${IMAGE_TAG}"
          else
            echo "No changes to commit (likely CI self-commit)"
          fi