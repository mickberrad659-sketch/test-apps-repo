name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'dev'
        type: choice
        options: [dev, staging, prod]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/test-apps-repo

jobs:
  validate:
    name: Validate Kustomize
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: go install sigs.k8s.io/kustomize/kustomize/v5@latest
      - name: Validate dev
        run: kustomize build environments/dev
      - name: Validate staging
        run: kustomize build environments/staging
      - name: Validate prod
        run: kustomize build environments/prod

  build-push:
    name: Build & Push
    needs: validate
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      id-token: write
    outputs:
      sha: ${{ steps.sha.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Docker buildx with OIDC-based GHCR auth (no secrets needed)
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          oidc-provider: azure

      - uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=ref,event=branch

      - name: Record short SHA
        id: sha
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=main
          cache-to: type=gha,mode=max,scope=main
          provenance: false
          sbom: false

  deploy:
    name: Deploy
    needs: build-push
    runs-on: ubuntu-24.04
    environment: ${{ github.event.inputs.environment || 'dev' }}
    concurrency:
      group: deploy-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            environments/${{ github.event.inputs.environment || 'dev' }}
          sparse-checkout-cone-mode: false

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          ssh -o StrictHostKeyChecking=no -i /home/al/clone/t3s-argo/secrets/control-plane-ssh-key \
              root@2.26.98.178 "cat /etc/rancher/k3s/k3s.yaml" | \
              sed 's|127.0.0.1|2.26.98.178|g' > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Build and apply manifest
        env:
          IMAGE_TAG: ${{ needs.build-push.outputs.sha }}
          ENV: ${{ github.event.inputs.environment || 'dev' }}
        run: |
          mkdir -p /tmp/kustomize-out
          cat > /tmp/kustomize-out/image.yaml << EOF
          apiVersion: kustomize.config.k8s.io/v1beta1
          kind: Kustomization
          images:
            - name: nginx
              newName: ghcr.io/\${{ github.repository_owner }}/test-apps-repo
              newTag: \$IMAGE_TAG
          EOF
          cd environments/$ENV
          kustomize build . --load-restrictor=LoadRestrictionsNone > /tmp/kustomize-out/manifest.yaml
          kubectl apply --server-side -f /tmp/kustomize-out/manifest.yaml
          echo "Deployed with image tag: $IMAGE_TAG to env: $ENV"

      - name: Verify deployment
        env:
          ENV: ${{ github.event.inputs.environment || 'dev' }}
          SUFFIX: ${{ github.event.inputs.environment || 'dev' }}
        run: |
          DEPLOY_NAME="test-app-${SUFFIX}"
          kubectl rollout status deployment/$DEPLOY_NAME --timeout=60s || true
          kubectl get deployment,pods -l app.kubernetes.io/managed-by=argocd 2>/dev/null || kubectl get pods
