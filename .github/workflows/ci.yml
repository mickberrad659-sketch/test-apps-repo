name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'dev'
        type: choice
        options: [dev, staging, prod]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/test-apps-repo

jobs:
  validate:
    name: Validate Kustomize
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Install kustomize
        run: |
          TAG=$(curl -sL "https://api.github.com/repos/kubernetes-sigs/kustomize/releases/latest" | python3 -c "import json,sys; print(json.load(sys.stdin)['tag_name'])")
          curl -sSL "https://github.com/kubernetes-sigs/kustomize/releases/download/${TAG}/kustomize_${TAG#kustomize\/}_linux_amd64.tar.gz" -o kustomize.tar.gz
          tar xzf kustomize.tar.gz
          chmod +x kustomize
          ./kustomize version
      - name: Validate all overlays
        run: |
          kustomize build environments/dev
          kustomize build environments/staging
          kustomize build environments/prod

  build-push:
    name: Build & Push
    needs: validate
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      id-token: write
    outputs:
      sha: ${{ steps.sha.outputs.sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          oidc-provider: azure

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=ref,event=branch

      - name: Record short SHA
        id: sha
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=main
          cache-to: type=gha,mode=max,scope=main
          provenance: false
          sbom: false

  deploy:
    name: Deploy
    needs: build-push
    runs-on: ubuntu-24.04
    environment: ${{ github.event.inputs.environment || 'dev' }}
    concurrency:
      group: deploy-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            environments
          sparse-checkout-cone-mode: false

      - name: Get kubeconfig
        run: |
          mkdir -p ~/.kube
          ssh -o StrictHostKeyChecking=no \
              -o ConnectTimeout=10 \
              -i /home/al/clone/t3s-argo/secrets/control-plane-ssh-key \
              root@2.26.98.178 \
              "cat /etc/rancher/k3s/k3s.yaml" | \
              sed 's|127.0.0.1|2.26.98.178|g' > ~/.kube/config
          chmod 600 ~/.kube/config
        env:
          KNOWN_HOSTS: ${{ secrets.KNOWN_HOSTS }}

      - name: Setup kubectl
        run: |
          mkdir -p /usr/local/bin
          curl -sLo /usr/local/bin/kubectl https://dl.k8s.io/release/$(curl -sL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl
          chmod +x /usr/local/bin/kubectl
          kubectl version --client

      - name: Build and apply manifest
        env:
          IMAGE_TAG: ${{ needs.build-push.outputs.sha }}
          ENV: ${{ github.event.inputs.environment || 'dev' }}
        run: |
          cd environments/$ENV
          kustomize build . --load-restrictor=LoadRestrictionsNone | \
            sed 's|nginx:alpine|ghcr.io/${{ github.repository_owner }}/test-apps-repo:'"$IMAGE_TAG"'|g' | \
            kubectl apply --server-side -f -
          echo "Deployed image: ghcr.io/${{ github.repository_owner }}/test-apps-repo:$IMAGE_TAG"

      - name: Verify deployment
        env:
          SUFFIX: ${{ github.event.inputs.environment || 'dev' }}
        run: |
          DEPLOY="test-app-${SUFFIX}"
          kubectl get deployment "$DEPLOY" -o wide
          kubectl get pods -l app=test-app 2>/dev/null || kubectl get pods